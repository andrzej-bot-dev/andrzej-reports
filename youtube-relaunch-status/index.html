<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Relaunch — Live Status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #38bdf8; }
  .card { background: #1e293b; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #334155; }
  .card h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .progress-bar { width: 100%; height: 8px; background: #334155; border-radius: 4px; margin: 1rem 0; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #38bdf8, #818cf8); border-radius: 4px; transition: width 1s ease; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin: 1rem 0; }
  .stat { background: #0f172a; padding: 0.75rem; border-radius: 8px; text-align: center; }
  .stat-value { font-size: 1.5rem; font-weight: 700; color: #38bdf8; }
  .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; }
  .log-line { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; color: #64748b; padding: 0.5rem; background: #0f172a; border-radius: 6px; margin-top: 0.5rem; }
  .step { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid #1e293b; }
  .step:last-child { border-bottom: none; }
  .step-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; flex-shrink: 0; }
  .step-done { background: #065f46; color: #6ee7b7; }
  .step-active { background: #1e3a5f; color: #38bdf8; animation: pulse 2s infinite; }
  .step-pending { background: #1e293b; color: #475569; border: 1px solid #334155; }
  .step-failed { background: #7f1d1d; color: #fca5a5; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .timestamp { font-size: 0.7rem; color: #475569; margin-top: 1rem; text-align: right; }
  .done-badge { display: inline-block; background: #065f46; color: #6ee7b7; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
  a { color: #38bdf8; }
</style>
</head>
<body>
<div class="container">
  <h1>🎬 YouTube Relaunch — CodingWithDawid</h1>
  <div class="card">
    <h2>Progress</h2>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-value" id="done">0</div><div class="stat-label">Done</div></div>
      <div class="stat"><div class="stat-value" id="active">1</div><div class="stat-label">In Progress</div></div>
      <div class="stat"><div class="stat-value" id="failed">0</div><div class="stat-label">Failed</div></div>
      <div class="stat"><div class="stat-value" id="elapsed">00:00</div><div class="stat-label">Elapsed / 2h</div></div>
    </div>
    <div id="steps"></div>
    <div class="log-line" id="logLine">Starting...</div>
    <div class="timestamp" id="timestamp"></div>
  </div>
</div>
<script>
  const STATUS_URL = 'status.json';
  async function refresh() {
    try {
      const r = await fetch(STATUS_URL + '?t=' + Date.now());
      const d = await r.json();
      document.getElementById('progressFill').style.width = d.pct + '%';
      document.getElementById('done').textContent = d.done;
      document.getElementById('active').textContent = d.active;
      document.getElementById('failed').textContent = d.failed;
      document.getElementById('elapsed').textContent = d.elapsed || '--:--';
      document.getElementById('logLine').textContent = d.lastLog || '...';
      document.getElementById('timestamp').textContent = 'Updated: ' + (d.updated || '');
      let stepsHtml = '';
      (d.steps || []).forEach(s => {
        let cls = s.status === 'done' ? 'step-done' : s.status === 'active' ? 'step-active' : s.status === 'failed' ? 'step-failed' : 'step-pending';
        let icon = s.status === 'done' ? '✅' : s.status === 'active' ? '▶️' : s.status === 'failed' ? '❌' : '⏳';
        stepsHtml += `<div class="step"><div class="step-icon ${cls}">${icon}</div><span>${s.name}</span></div>`;
      });
      document.getElementById('steps').innerHTML = stepsHtml;
      if (d.done === d.total && d.total > 0) {
        document.querySelector('h1').innerHTML = '✅ YouTube Relaunch — DONE';
      }
    } catch(e) { /* best effort */ }
  }
  refresh();
  setInterval(refresh, 20000);
</script>
</body>
</html>
